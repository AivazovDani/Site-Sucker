{% extends 'main.html' %}
{% block content %}
<!-- Main Section -->
    <main class="formPage my-xl">
        <div class="content-box">
            <div class="formWrapper">
                <a class="backButton" href="{% url 'user-account' %}"><i class="im im-angle-left"></i>←</a>
                <br>

                <form class="form" method="POST" action="{% url 'delete-project' project.id %}" enctype="multipart/form-data">
                    {% csrf_token %}
                    <p>Are your sure you want to delete {{project.title}}?</p>
                    <a class="btn btn--sub btn--lg  my-md" href="{% url 'user-account' %}">Go Back</a>
                    <input class="btn btn--sub btn--lg  my-md" type="submit" value="Delete" />
                </form>
            </div>
        </div>
    </main>
{% endblock content%}
